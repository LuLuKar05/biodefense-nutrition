version: "3.9"

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./data:/app/data

  worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./data:/app/data

  beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - mongodb
      - redis

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend

volumes:
  mongo_data:
